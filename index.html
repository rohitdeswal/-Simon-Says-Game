<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/simon.jpg">
</head>
<body>
    <h1>🎮 SIMON SAYS</h1>
    <h2>Ready to test your memory?</h2>
    <button id="startBtn">🚀 Start Game</button>

    <div class="btn-container">
        <div class="line-one">
            <div class="btn red" type="button" id="red"></div>
            <div class="btn yellow" type="button" id="yellow"></div>
        </div>
        <div class="line-two">
            <div class="btn green" type="button" id="green"></div>
            <div class="btn purple" type="button" id="purple"></div>
        </div>
    </div>
    <div class="guide"><p>
        🎯 <b>HOW TO PLAY</b><br><br>
        👀 Watch the flashing color<br>
        🖱️ Click the same color<br>
        🧠 A new color is added every round<br>
        🔁 Repeat the full sequence in order<br>
        📈 The sequence gets longer each level<br>
        💀 One mistake = Game Over<br><br>
        🔥 Stay focused. Beat your best score.
        </p>
    </div>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="app.js"></script>
</body>
</html>
